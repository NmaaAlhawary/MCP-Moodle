<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="MCP-Moodle logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffa53f"/>
      <stop offset="1" stop-color="#f26a00"/>
    </linearGradient>
  </defs>

  <!-- speech bubble = "talk", with a tail at the bottom-left -->
  <path fill="url(#g)" d="
    M156 60
    h200
    a96 96 0 0 1 96 96
    v160
    a96 96 0 0 1 -96 96
    H210
    l-58 56
    a10 10 0 0 1 -17 -7
    v-49
    h-3
    a96 96 0 0 1 -76 -96
    V156
    a96 96 0 0 1 96 -96
    z"/>

  <!-- graduation cap = "Moodle / education", in white -->
  <g transform="translate(0,-10)" fill="#ffffff">
    <!-- board (diamond) -->
    <polygon points="252,150 372,203 252,256 132,203"/>
    <!-- head / cap base -->
    <path d="M184 219 L252 249 L320 219 L320 272 C320 300 184 300 184 272 Z"/>
  </g>

  <!-- tassel + node -->
  <path d="M372 193 L372 262" transform="translate(0,-10)" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
  <circle cx="372" cy="264" r="16" fill="#ffffff"/>
  <circle cx="372" cy="264" r="7" fill="#f26a00"/>
  <circle cx="252" cy="193" r="13" fill="#f26a00"/>
</svg>
