<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="MCP-Moodle logo">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffa23e"/>
      <stop offset="1" stop-color="#f26a00"/>
    </linearGradient>
  </defs>

  <!-- rounded app-icon badge in Moodle orange -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#badge)"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6"/>

  <!-- graduation cap (mortarboard) in white -->
  <g fill="#ffffff">
    <!-- board (diamond) -->
    <polygon points="256,150 402,214 256,278 110,214"/>
    <!-- head / cap base -->
    <path d="M176 236 L256 271 L336 236 L336 300 C336 334 176 334 176 300 Z"/>
  </g>

  <!-- tassel + chat/AI node in white -->
  <path d="M402 214 L402 300" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <circle cx="402" cy="322" r="20" fill="#ffffff"/>
  <circle cx="402" cy="322" r="9" fill="#f26a00"/>

  <!-- small centre eyelet on the board -->
  <circle cx="256" cy="214" r="15" fill="#f26a00"/>
</svg>
